    <div id="navbar-container"></div>

    <main class="tool-page">
      <div class="tool-container">
        <div class="tool-header">
          <h1><i data-lucide="repeat"></i> Scientific Unit Converter</h1>
          <p>Convert between common scientific units</p>
        </div>

        <div class="tool-card">
          <div class="tabs" id="category-tabs">
            <button class="tab active" data-category="length" data-icon="ruler">
              <i data-lucide="ruler" class="tab-icon"></i>Length
            </button>
            <button class="tab" data-category="mass" data-icon="weight">
              <i data-lucide="weight" class="tab-icon"></i>Mass
            </button>
            <button
              class="tab"
              data-category="temperature"
              data-icon="thermometer"
            >
              <i data-lucide="thermometer" class="tab-icon"></i>Temperature
            </button>
            <button class="tab" data-category="pressure" data-icon="gauge">
              <i data-lucide="gauge" class="tab-icon"></i>Pressure
            </button>
            <button class="tab" data-category="energy" data-icon="zap">
              <i data-lucide="zap" class="tab-icon"></i>Energy
            </button>
            <button class="tab" data-category="volume" data-icon="beaker">
              <i data-lucide="beaker" class="tab-icon"></i>Volume
            </button>
            <button class="tab" data-category="concentration" data-icon="flask">
              <i data-lucide="flask-conical" class="tab-icon"></i>Concentration
            </button>
            <button class="tab" data-category="time" data-icon="clock">
              <i data-lucide="clock" class="tab-icon"></i>Time
            </button>
            <button class="tab" data-category="speed" data-icon="gauge">
              <i data-lucide="timer" class="tab-icon"></i>Speed
            </button>
          </div>

          <div class="converter-grid">
            <div class="input-section">
              <div class="form-group">
                <label>From</label>
                <select id="from-unit"></select>
              </div>
              <div class="form-group">
                <label>Value</label>
                <input
                  type="number"
                  id="from-value"
                  placeholder="Enter value"
                  step="any"
                />
              </div>
            </div>

            <div class="swap-section">
              <button class="swap-btn" onclick="swapUnits()">
                <i data-lucide="arrow-left-right"></i>
              </button>
            </div>

            <div class="input-section">
              <div class="form-group">
                <label>To</label>
                <select id="to-unit"></select>
              </div>
              <div class="form-group">
                <label>Result</label>
                <div class="input-with-actions">
                  <input
                    type="text"
                    id="to-value"
                    readonly
                    placeholder="Result"
                  />
                  <button
                    class="action-btn"
                    id="copy-btn"
                    title="Copy to clipboard"
                  >
                    <i data-lucide="copy"></i>
                  </button>
                  <button class="action-btn" id="reset-btn" title="Reset">
                    <i data-lucide="rotate-ccw"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="formula-display" id="formula-display"></div>
        </div>

        <div class="tool-card">
          <h3><i data-lucide="history"></i> Conversion History</h3>

            <p class="history-empty">No conversions yet</p>

          <h3><i data-lucide="calculator"></i> Quick Conversions</h3>

        },

          ],
          baseUnit: "s",
        },
        speed: {
          units: ["m/s", "km/h", "mph", "ft/s", "knot", "c"],
          names: [
            "Meters/Second",
            "Kilometers/Hour",
            "Miles/Hour",
            "Feet/Second",
            "Knots",
            "Speed of Light",
          ],
          toBase: [1, 0.277778, 0.44704, 0.3048, 0.514444, 299792458],
          baseUnit: "m/s",
        },
      };

      let currentCategory = "length";
      let conversionHistory = [];

      // ── Core functions ──────────────────────────────────────────────────────
      function formatNumber(num) {
        if (num === 0) return "0";
        if (!isFinite(num)) return "∞";
        if (Math.abs(num) >= 1e15 || (Math.abs(num) < 1e-6 && num !== 0))
          return num.toExponential(6);
        if (Number.isInteger(num)) return num.toLocaleString();
        return parseFloat(num.toPrecision(10)).toString();
      }

      function convertTemperature(value, from, to) {
        if (from === to) return value;
        const toC = { "°C": v => v, "°F": v => (v - 32) * 5/9, "K": v => v - 273.15, "°R": v => (v - 491.67) * 5/9 };
        const fromC = { "°C": v => v, "°F": v => v * 9/5 + 32, "K": v => v + 273.15, "°R": v => (v + 273.15) * 9/5 };
        return fromC[to](toC[from](value));
      }

      function updateFormula(val, from, result, to) {
        const el = document.getElementById("formula-display");
        if (el) el.textContent = `${val} ${from} = ${formatNumber(result)} ${to}`;
      }

      function showNotification(msg) {
        let el = document.getElementById("uc-toast");
        if (!el) {
          el = document.createElement("div");
          el.id = "uc-toast";
          el.style.cssText = "position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--bg-secondary,#1e1e2e);color:var(--text-primary,#fff);padding:.75rem 1.5rem;border-radius:8px;border:1px solid var(--border-color,#333);z-index:9999;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none";
          document.body.appendChild(el);
        }
        el.textContent = msg;
        el.style.opacity = "1";
        clearTimeout(el._t);
        el._t = setTimeout(() => el.style.opacity = "0", 2500);
      }

      document.addEventListener("DOMContentLoaded", () => {
        if (typeof lucide !== "undefined") lucide.createIcons();
        setupTabs();
        loadCategory("length");

        document
          .getElementById("from-value")
          .addEventListener("input", convert);
        document
          .getElementById("from-unit")
          .addEventListener("change", convert);
        document.getElementById("to-unit").addEventListener("change", convert);

        document
          .getElementById("from-value")
          .addEventListener("keydown", (e) => {
            if (e.key === "Enter") convert();
          });

        document
          .getElementById("copy-btn")
          .addEventListener("click", copyToClipboard);
        document
          .getElementById("reset-btn")
          .addEventListener("click", resetConverter);
      });

      function setupTabs() {
        document.querySelectorAll(".tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            document
              .querySelectorAll(".tab")
              .forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            loadCategory(tab.dataset.category);
          });
        });
      }

      function loadCategory(category) {
        currentCategory = category;
        const data = unitData[category];
        const fromSelect = document.getElementById("from-unit");
        const toSelect = document.getElementById("to-unit");

        fromSelect.innerHTML = "";
        toSelect.innerHTML = "";

        data.units.forEach((unit, i) => {
          fromSelect.innerHTML += `<option value="${unit}">${data.names[i]} (${unit})</option>`;
          toSelect.innerHTML += `<option value="${unit}">${data.names[i]} (${unit})</option>`;
        });

        if (data.units.length > 1) toSelect.selectedIndex = 1;

        document.getElementById("from-value").value = "";
        document.getElementById("to-value").value = "";
        document.getElementById("formula-display").textContent = "";

        updateQuickConversions();
        if (typeof lucide !== "undefined") lucide.createIcons();
      }

      function convert() {
        const rawVal = document.getElementById("from-value").value.trim();
        const value = parseFloat(rawVal);
        const fromUnit = document.getElementById("from-unit").value;
        const toUnit = document.getElementById("to-unit").value;

        if (!rawVal || isNaN(value)) {
          document.getElementById("to-value").value = "";
          document.getElementById("formula-display").textContent = "";
          return;
        }
        if (!isFinite(value)) {
          showNotification("Please enter a finite number");
          document.getElementById("to-value").value = "";
          return;
        }

        let result;
        if (currentCategory === "temperature") {
          result = convertTemperature(value, fromUnit, toUnit);
        } else {
          const data = unitData[currentCategory];
          const fromIndex = data.units.indexOf(fromUnit);
          const toIndex = data.units.indexOf(toUnit);
          const baseValue = value * data.toBase[fromIndex];
          result = baseValue / data.toBase[toIndex];
        }

        document.getElementById("to-value").value = formatNumber(result);
        updateFormula(value, fromUnit, result, toUnit);
        addToHistory(value, fromUnit, result, toUnit);
      }

      function addToHistory(fromVal, fromUnit, toVal, toUnit) {
        const conversion = `${fromVal} ${fromUnit} = ${formatNumber(toVal)} ${toUnit}`;
        if (
          conversionHistory.length === 0 ||
          conversionHistory[0] !== conversion
        ) {
          conversionHistory.unshift(conversion);
          if (conversionHistory.length > 5) conversionHistory.pop();
          updateHistoryDisplay();
        }
      }

      function updateHistoryDisplay() {
        const container = document.getElementById("history-list");
        if (conversionHistory.length === 0) {
          container.innerHTML =
            '<p class="history-empty">No conversions yet</p>';
          return;
        }
        container.innerHTML = conversionHistory
          .map(
            (conv, i) => `
          <div class="history-item" onclick="restoreFromHistory(${i})">
            <span class="conversion">${conv.split(" = ")[0]}</span>
            <span class="result">= ${conv.split(" = ")[1]}</span>
          </div>
        `,
          )
          .join("");
      }

      function restoreFromHistory(index) {
        const conv = conversionHistory[index];
        const parts = conv.split(" = ");
        const leftParts = parts[0].split(" ");
        const value = parseFloat(leftParts[0]);
        const fromUnit = leftParts[1];
        const rightParts = parts[1].split(" ");
        const toUnit = rightParts[rightParts.length - 1];

        document.getElementById("from-value").value = value;
        document.getElementById("from-unit").value = fromUnit;
        document.getElementById("to-unit").value = toUnit;
        convert();
      }

      function copyToClipboard() {
        const result = document.getElementById("to-value").value;
        if (result) {
          navigator.clipboard.writeText(result).then(() => {
            const btn = document.getElementById("copy-btn");
            btn.innerHTML = '<i data-lucide="check"></i>';
            if (typeof lucide !== "undefined") lucide.createIcons();
            setTimeout(() => {
              btn.innerHTML = '<i data-lucide="copy"></i>';
              if (typeof lucide !== "undefined") lucide.createIcons();
            }, 1500);
          });
        }
      }

      function resetConverter() {
        document.getElementById("from-value").value = "";
        document.getElementById("to-value").value = "";
        document.getElementById("formula-display").textContent = "";
        conversionHistory = [];
        updateHistoryDisplay();
      }

      function swapUnits() {
        const fromSelect = document.getElementById("from-unit");
        const toSelect = document.getElementById("to-unit");
        const temp = fromSelect.value;
        fromSelect.value = toSelect.value;
        toSelect.value = temp;
        convert();
      }

      function updateQuickConversions() {
        const container = document.getElementById("quick-conversions");
        const data = unitData[currentCategory];
        const quickItems = [];

        // Generate some useful quick conversions
        const examples = {
          length: [
            [1, "m", "ft"],
            [1, "km", "mi"],
            [1, "nm", "Å"],
            [1, "in", "cm"],
          ],
          mass: [
            [1, "kg", "lb"],
            [1, "g", "oz"],
            [1, "amu", "kg"],
            [1, "ton", "kg"],
          ],
          temperature: [
            [0, "°C", "°F"],
            [100, "°C", "°F"],
            [25, "°C", "K"],
            [0, "K", "°C"],
          ],
          pressure: [
            [1, "atm", "Pa"],
            [1, "bar", "atm"],
            [760, "mmHg", "atm"],
            [1, "psi", "kPa"],
          ],
          energy: [
            [1, "kcal", "kJ"],
            [1, "eV", "J"],
            [1, "kWh", "J"],
            [1, "BTU", "J"],
          ],
          volume: [
            [1, "L", "mL"],
            [1, "gal", "L"],
            [1, "m³", "L"],
            [1, "fl oz", "mL"],
          ],
          concentration: [
            [1, "M", "mM"],
            [1, "ppm", "μM"],
            [1, "%w/v", "M"],
            [1, "nM", "pM"],
          ],
          time: [
            [1, "h", "min"],
            [1, "day", "h"],
            [1, "year", "day"],
            [1, "s", "ms"],
          ],
          speed: [
            [1, "m/s", "km/h"],
            [1, "km/h", "mph"],
            [1, "mph", "knot"],
            [1, "knot", "m/s"],
          ],
        };

        container.innerHTML = "";

        examples[currentCategory].forEach(([val, from, to]) => {
          let result;
          if (currentCategory === "temperature") {
            result = convertTemperature(val, from, to);
          } else {
            const fromIndex = data.units.indexOf(from);
            const toIndex = data.units.indexOf(to);
            const baseValue = val * data.toBase[fromIndex];
            result = baseValue / data.toBase[toIndex];
          }

          container.innerHTML += `
                    <div class="quick-item">
                        <span class="from">${val} ${from}</span>
                        <span class="equals">=</span>
                        <span class="to">${formatNumber(result)} ${to}</span>
                    </div>
                `;
        });
      }
    </script>
