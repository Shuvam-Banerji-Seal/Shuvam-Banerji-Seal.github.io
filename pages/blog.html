    <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body { font-family: var(--font-body, 'Inter', sans-serif); background: var(--bg-deep); color: var(--text-primary); line-height: 1.7; overflow-x: hidden; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px); pointer-events: none; z-index: 9999; }
html:not([data-theme="dark"]) body::before { opacity: 0.4; }
.page-grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px); background-size: 60px 60px; z-index: 0; pointer-events: none; }
html:not([data-theme="dark"]) .page-grid-bg { background-image: linear-gradient(rgba(139,101,68,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(139,101,68,0.035) 1px, transparent 1px); }
main { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 6rem 2rem 4rem; }
.header-terminal { background: rgba(10,16,32,0.94); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 0 20px rgba(0,212,255,0.12), var(--shadow-card); margin-bottom: 2.5rem; }
html:not([data-theme="dark"]) .header-terminal { background: rgba(245,235,215,0.96); border-color: rgba(139,101,68,0.35); box-shadow: 0 0 20px rgba(201,124,58,0.1), 0 8px 32px rgba(44,26,14,0.08); }
.header-titlebar { background: #0d1526; padding: 0.55rem 1.1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,212,255,0.1); font-family: var(--font-mono); font-size: 0.73rem; }
html:not([data-theme="dark"]) .header-titlebar { background: #e8d5b0; border-bottom-color: rgba(139,101,68,0.25); }
.titlebar-dots { display: flex; gap: 0.4rem; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
.titlebar-path { color: var(--accent-cyan); font-family: var(--font-mono); display: flex; gap: 0.35rem; }
.path-host { color: var(--accent-green); }
html:not([data-theme="dark"]) .titlebar-path { color: #8b4513; }
html:not([data-theme="dark"]) .path-host { color: #3d6b2e; }
.titlebar-right { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.73rem; }
.header-body { padding: 2rem 2.5rem; }
.blog-page-title { font-size: 2rem; font-weight: 800; background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.4rem; font-family: var(--font-mono); }
.blog-page-sub { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1.5rem; }
.blog-stats { display: flex; gap: 2rem; flex-wrap: wrap; font-family: var(--font-mono); font-size: 0.8rem; }
.stat-key { color: var(--accent-cyan); }
.stat-val { color: var(--text-secondary); }
html:not([data-theme="dark"]) .stat-key { color: #8b4513; }
.filter-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 2.5rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.25rem; }
html:not([data-theme="dark"]) .filter-bar { background: rgba(139,101,68,0.05); border-color: rgba(139,101,68,0.2); }
.filter-label { font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
.search-box { flex: 1; min-width: 180px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.8rem; color: var(--text-primary); font-family: var(--font-mono); font-size: 0.82rem; outline: none; transition: border-color 0.2s; }
.search-box:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 2px rgba(0,212,255,0.1); }
html:not([data-theme="dark"]) .search-box { background: rgba(139,101,68,0.06); border-color: rgba(139,101,68,0.3); color: #2c1a0e; }
.tag-filter-btn { padding: 0.28rem 0.8rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.74rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.tag-filter-btn.active, .tag-filter-btn:hover { background: var(--accent-cyan); border-color: var(--accent-cyan); color: #0a1020; }
.blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 1.8rem; }
.blog-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s; display: flex; flex-direction: column; }
html:not([data-theme="dark"]) .blog-card { background: rgba(255,255,255,0.7); border-color: rgba(139,101,68,0.2); }
.blog-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,212,255,0.12); border-color: var(--accent-cyan); }
html:not([data-theme="dark"]) .blog-card:hover { box-shadow: 0 12px 40px rgba(201,124,58,0.15); border-color: #8b4513; }
.card-titlebar { background: #0d1526; padding: 0.42rem 0.9rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,212,255,0.1); font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); }
html:not([data-theme="dark"]) .card-titlebar { background: #e8d5b0; border-bottom-color: rgba(139,101,68,0.2); }
.card-dots { display: flex; gap: 5px; }
.cdot { width: 9px; height: 9px; border-radius: 50%; }
.cdot-r { background: #ff5f57; } .cdot-y { background: #febc2e; } .cdot-g { background: #28c840; }
.card-file { color: var(--accent-cyan); }
html:not([data-theme="dark"]) .card-file { color: #8b4513; }
.card-body { padding: 1.3rem 1.4rem; flex: 1; display: flex; flex-direction: column; }
.card-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.85rem; }
.card-tag { padding: 0.17rem 0.6rem; border-radius: 20px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2); color: var(--accent-cyan); font-family: var(--font-mono); font-size: 0.7rem; }
html:not([data-theme="dark"]) .card-tag { background: rgba(139,101,68,0.08); border-color: rgba(139,101,68,0.25); color: #8b4513; }
.card-title { font-weight: 700; font-size: 1.02rem; line-height: 1.4; margin-bottom: 0.6rem; color: var(--text-primary); text-decoration: none; display: block; }
.card-title:hover { color: var(--accent-cyan); }
html:not([data-theme="dark"]) .card-title:hover { color: #8b4513; }
.card-excerpt { font-size: 0.865rem; color: var(--text-secondary); line-height: 1.7; flex: 1; }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1.1rem; padding-top: 0.85rem; border-top: 1px solid rgba(255,255,255,0.06); font-family: var(--font-mono); font-size: 0.73rem; color: var(--text-muted); }
html:not([data-theme="dark"]) .card-footer { border-color: rgba(139,101,68,0.15); }
.card-read { color: var(--accent-cyan); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; font-weight: 600; transition: color 0.2s; }
.card-read:hover { color: var(--accent-green); }
html:not([data-theme="dark"]) .card-read { color: #8b4513; }
.card-read-arrow { transition: transform 0.2s; display: inline-block; }
.card-read:hover .card-read-arrow { transform: translateX(4px); }
.blog-loading { display: flex; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 0.75rem; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.85rem; }
.loading-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-cyan); animation: ldot 1.2s ease-in-out infinite; }
.loading-dot:nth-child(2){animation-delay:.2s} .loading-dot:nth-child(3){animation-delay:.4s}
@keyframes ldot{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.blog-empty { text-align: center; padding: 5rem 2rem; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.9rem; }
.post-back-link { display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); text-decoration: none; border: 1px solid var(--border); padding: 0.4rem 0.9rem; border-radius: 6px; transition: all 0.2s; margin-bottom: 2rem; }
.post-back-link:hover { color: var(--accent-cyan); border-color: var(--accent-cyan); }
html:not([data-theme="dark"]) .post-back-link:hover { color: #8b4513; border-color: #8b4513; }
.post-container { max-width: 820px; margin: 0 auto; }
.post-terminal { background: rgba(10,16,32,0.94); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 0 20px rgba(0,212,255,0.12), var(--shadow-card); }
html:not([data-theme="dark"]) .post-terminal { background: rgba(245,235,215,0.97); border-color: rgba(139,101,68,0.3); }
.post-titlebar { background: #0d1526; padding: 0.55rem 1.1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,212,255,0.1); font-family: var(--font-mono); font-size: 0.73rem; }
html:not([data-theme="dark"]) .post-titlebar { background: #e8d5b0; border-bottom-color: rgba(139,101,68,0.25); }
.post-header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

.post-tag { padding: 0.2rem 0.65rem; border-radius: 20px; background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.25); color: var(--accent-cyan); font-family: var(--font-mono); font-size: 0.72rem; }
html:not([data-theme="dark"]) .post-tag { background: rgba(139,101,68,0.08); border-color: rgba(139,101,68,0.3); color: #8b4513; }
.post-title { font-size: 1.9rem; font-weight: 800; line-height: 1.25; background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.75rem; }
@media(max-width:600px){.post-title{font-size:1.35rem}}

.post-body { padding: 2rem 2.5rem; }
@media(max-width:600px){.post-header,.post-body{padding:1.25rem}}
.prose { font-family: var(--font-body); color: var(--text-secondary); font-size: 0.94rem; line-height: 1.85; }

html:not([data-theme="dark"]) .prose a { color: #8b4513; border-bottom-color: rgba(139,101,68,0.4); }

.prose pre code { background: transparent; border: none; padding: 0; color: var(--text-secondary); }
.prose blockquote { border-left: 3px solid var(--accent-cyan); margin: 1.5rem 0; padding: .75rem 1.25rem; background: rgba(0,212,255,0.05); border-radius: 0 8px 8px 0; color: var(--text-secondary); font-style: italic; }

footer { position: relative; z-index: 1; background: var(--bg-dark); border-top: 1px solid var(--border); padding: 2.5rem 2rem; text-align: center; font-family: var(--font-mono); font-size: .78rem; color: var(--text-muted); }
